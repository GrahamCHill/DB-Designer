name: Release Desktop App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    outputs:
      tag_name: ${{ steps.release-meta.outputs.tag_name }}
      release_name: ${{ steps.release-meta.outputs.release_name }}
      release_draft: ${{ steps.release-meta.outputs.release_draft }}
      release_prerelease: ${{ steps.release-meta.outputs.release_prerelease }}
    steps:
      - name: Determine release metadata
        id: release-meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            RELEASE_NAME="DB Designer ${TAG_NAME}"
            RELEASE_DRAFT="false"
            RELEASE_PRERELEASE="false"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            TAG_NAME="build-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            RELEASE_NAME="DB Designer build ${GITHUB_RUN_NUMBER} (${SHORT_SHA})"
            RELEASE_DRAFT="false"
            RELEASE_PRERELEASE="true"
          fi

          {
            echo "tag_name=${TAG_NAME}"
            echo "release_name=${RELEASE_NAME}"
            echo "release_draft=${RELEASE_DRAFT}"
            echo "release_prerelease=${RELEASE_PRERELEASE}"
          } >> "${GITHUB_OUTPUT}"

  build-and-release:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          releaseName: ${{ needs.prepare-release.outputs.release_name }}
          releaseBody: |
            Desktop bundles generated by GitHub Actions.

            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          releaseDraft: ${{ needs.prepare-release.outputs.release_draft == 'true' }}
          prerelease: ${{ needs.prepare-release.outputs.release_prerelease == 'true' }}
          args: ${{ matrix.args }}
