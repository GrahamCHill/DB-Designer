name: Release Desktop App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    outputs:
      tag_name: ${{ steps.release-meta.outputs.tag_name }}
      release_name: ${{ steps.release-meta.outputs.release_name }}
      release_draft: ${{ steps.release-meta.outputs.release_draft }}
      release_prerelease: ${{ steps.release-meta.outputs.release_prerelease }}
      version: ${{ steps.release-meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release metadata
        id: release-meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            RELEASE_NAME="DB Designer ${TAG_NAME}"
            RELEASE_DRAFT="false"
            RELEASE_PRERELEASE="false"
          else
            TAG_NAME="v${VERSION}"
            RELEASE_NAME="DB Designer ${VERSION}"
            RELEASE_DRAFT="false"
            RELEASE_PRERELEASE="false"
          fi

          {
            echo "tag_name=${TAG_NAME}"
            echo "release_name=${RELEASE_NAME}"
            echo "release_draft=${RELEASE_DRAFT}"
            echo "release_prerelease=${RELEASE_PRERELEASE}"
          } >> "${GITHUB_OUTPUT}"

  build-and-release:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Update versions (installer)
        shell: bash
        run: |
          npm version ${{ needs.prepare-release.outputs.version }} --no-git-tag-version --allow-same-version
          
          # Conditionally update tauri.conf.json for Windows signing if thumbprint is present
          if [ -n "$T_WINDOWS_THUMBPRINT" ]; then
            echo "Setting Windows certificate thumbprint..."
            node -e "
              const fs = require('fs');
              const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
              config.bundle.windows.certificateThumbprint = process.env.T_WINDOWS_THUMBPRINT;
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(config, null, 2));
            "
          fi
        env:
          T_WINDOWS_THUMBPRINT: ${{ secrets.TAURI_WINDOWS_CERT_THUMBPRINT }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          releaseName: ${{ needs.prepare-release.outputs.release_name }}
          releaseBody: |
            Desktop bundles generated by GitHub Actions.

            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          releaseDraft: ${{ needs.prepare-release.outputs.release_draft == 'true' }}
          prerelease: ${{ needs.prepare-release.outputs.release_prerelease == 'true' }}
          args: ${{ matrix.args }}
